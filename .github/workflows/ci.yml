name: HireHub CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server-ci:
    name: Server CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Cache MongoDB Binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-6.0.14

      - name: Install Dependencies
        run: |
          cd server
          npm ci

      - name: Run Tests
        run: |
          cd server
          npm test
        env:
          JWT_SECRET: test_secret_key_for_ci_only_do_not_use_in_prod
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test

  client-ci:
    name: Client CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm ci

      - name: Run Build
        run: |
          cd client
          npm run build

  ai-service-ci:
    name: AI Service CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Install Dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd ai-service
          pytest
