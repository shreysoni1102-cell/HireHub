version: '3.8'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
  
  server:
    build: ./server
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file: ./server/.env
    depends_on:
      - mongo

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file: ./ai-service/.env

volumes:
  mongo_data:
